const ROUND_COLORS = ["#4ea1ff","#46c98b","#f2c14e","#ef7d57","#b06bd6",
                      "#34c3c9","#9aa6b2"];
const $ = s => document.querySelector(s);

// metric dropdown
const msel = $("#metric");
DATA.metrics.forEach(m => {
  const o = document.createElement("option");
  o.value = m; o.textContent = DATA.metricLabels[m]; msel.appendChild(o);
});
msel.value = "points";

let view = "total";      // total | stack
let metric = "points";
let roundFilter = "all";
let sortKey = "points";
let chart;

function valueFor(t) {
  if (roundFilter === "all") return t.total[metric];
  return t.rounds[roundFilter][metric];
}
function rowStat(t, k) {
  if (roundFilter === "all") return t.total[k];
  return t.rounds[roundFilter][k];
}

function renderChart() {
  const labels = [], teams = DATA.teams.slice();
  const stacked = (view === "stack" && roundFilter === "all");

  teams.sort((a, b) => valueFor(b) - valueFor(a));
  teams.forEach(t => labels.push(t.team));

  let datasets;
  if (stacked) {
    datasets = [];
    for (let r = 1; r <= 7; r++) {
      datasets.push({
        label: "Round " + r,
        data: teams.map(t => t.rounds[String(r)][metric]),
        backgroundColor: ROUND_COLORS[r - 1],
        borderWidth: 0,
      });
    }
  } else {
    datasets = [{
      label: DATA.metricLabels[metric],
      data: teams.map(t => valueFor(t)),
      backgroundColor: "#4ea1ff",
      borderWidth: 0,
    }];
  }

  const cfg = {
    type: "bar",
    data: { labels, datasets },
    options: {
      indexAxis: "y",
      maintainAspectRatio: false,
      responsive: true,
      scales: {
        x: { stacked, grid: { color: "#222b33" }, ticks: { color: "#8a97a6" } },
        y: { stacked, grid: { display: false }, ticks: { color: "#cdd6df", font: { size: 12 } } },
      },
      plugins: {
        legend: { display: stacked, labels: { color: "#cdd6df" } },
        title: {
          display: true, color: "#e8edf2", font: { size: 15 },
          text: DATA.metricLabels[metric]
                + (roundFilter === "all" ? " by team, all rounds"
                                         : " by team, round " + roundFilter)
                + (stacked ? " (stacked by round)" : ""),
        },
      },
    },
  };
  if (chart) chart.destroy();
  chart = new Chart($("#chart"), cfg);
}

function renderTable() {
  const tb = $("#tbl tbody");
  tb.innerHTML = "";
  const teams = DATA.teams.slice().sort((a, b) =>
    sortKey === "team" ? a.team.localeCompare(b.team)
                       : rowStat(b, sortKey) - rowStat(a, sortKey));
  teams.forEach(t => {
    const tr = document.createElement("tr");
    const cells = [t.team, rowStat(t, "picks"), rowStat(t, "gp"),
                   rowStat(t, "goals"), rowStat(t, "assists"), rowStat(t, "points")];
    cells.forEach((c, i) => {
      const td = document.createElement("td");
      if (i > 0) td.className = "num";
      td.textContent = i === 0 ? c : c.toLocaleString();
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  $("#tableNote").textContent =
    roundFilter === "all" ? "(all rounds)" : "(round " + roundFilter + " only)";
  document.querySelectorAll("#tbl th").forEach(th =>
    th.classList.toggle("sorted", th.dataset.k === sortKey));
}

function renderAll() { renderChart(); renderTable(); }

msel.addEventListener("change", e => { metric = e.target.value; renderChart(); });
$("#round").addEventListener("change", e => { roundFilter = e.target.value; renderAll(); });
$("#vTotal").addEventListener("click", () => {
  view = "total"; $("#vTotal").classList.add("on"); $("#vStack").classList.remove("on"); renderChart();
});
$("#vStack").addEventListener("click", () => {
  view = "stack"; $("#vStack").classList.add("on"); $("#vTotal").classList.remove("on"); renderChart();
});
document.querySelectorAll("#tbl th").forEach(th =>
  th.addEventListener("click", () => { sortKey = th.dataset.k; renderTable(); }));

renderAll();
</script>
